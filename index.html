<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NORRIS GRAPHICS DESIGNZ</title>
  <style>
    body {
      background: #000; /* FULL BLACK */
      color: #ffd700; /* GOLD TEXT */
      font-family: Arial, sans-serif;
      text-align: center;
      margin: 0;
      padding: 0;
    }
    
    header {
      padding: 20px;
      border-bottom: 3px solid #ffd700;
    }
    
    .logo {
      width: 120px;
      height: auto;
      margin: 20px auto;
      display: block;
      border-radius: 15px;
      border: 3px solid #ffd700;
    }
    
    .company-name {
      color: #ffd700;
      font-size: 32px;
      font-weight: bold;
      margin: 10px 0;
      letter-spacing: 3px;
    }
    
    nav {
      margin: 20px 0;
    }
    
    nav a {
      color: #ffd700;
      text-decoration: none;
      margin: 0 10px;
      font-weight: bold;
      font-size: 16px;
    }
    
    .hero {
      padding: 40px 20px;
    }
    
    .hero h1 {
      color: #ffd700;
      font-size: 28px;
      line-height: 1.4;
    }
    
    .hero p {
      color: #ccc; /* Light gold/grey for subtext */
      font-size: 15px;
      padding: 0 10px;
    }
    
    .btn {
      display: inline-block;
      padding: 15px 30px;
      margin: 10px;
      border-radius: 50px;
      font-weight: bold;
      text-decoration: none;
      font-size: 16px;
    }
    
    .btn-gold {
      background: #ffd700;
      color: #000;
    }
    
    .btn-green {
      background: #25D366;
      color: #fff;
    }
    
    section {
      padding: 40px 20px;
    }
    
    h2 {
      color: #ffd700;
      font-size: 28px;
      margin-bottom: 20px;
    }
    
    .services-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 15px;
      max-width: 400px;
      margin: 0 auto;
    }
    
    .service-box {
      border: 2px solid #ffd700;
      padding: 20px;
      border-radius: 10px;
      color: #ffd700;
      font-weight: bold;
      font-size: 18px;
    }
    
    .portfolio {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 15px;
      padding: 0 20px;
      max-width: 600px;
      margin: 0 auto;
    }
    
    .portfolio img {
      width: 100%;
      border-radius: 10px;
      border: 2px solid #ffd700;
    }
    
    .contact {
      background: #ffd700;
      color: #000;
      padding: 30px 20px;
      margin-top: 30px;
      font-weight: bold;
    }
